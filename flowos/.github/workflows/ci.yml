name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  TURBO_TELEMETRY_DISABLED: "1"
  DO_NOT_TRACK: "1"

permissions:
  contents: read

jobs:
  # ------------------------------------------------------------------
  # Lint, typecheck/build, unit tests (turbo-orchestrated)
  # ------------------------------------------------------------------
  build-and-test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack (pnpm from packageManager field)
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Get pnpm store directory
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build

      - name: Unit tests
        run: pnpm test

  # ------------------------------------------------------------------
  # Prisma schema / migration drift check against a real Postgres
  # ------------------------------------------------------------------
  migration-check:
    name: Prisma Migration Check
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: flowos
          POSTGRES_PASSWORD: flowos_ci_password
          POSTGRES_DB: flowos_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flowos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://flowos:flowos_ci_password@localhost:5432/flowos_ci?schema=public
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pnpm install

      - name: Validate Prisma schema
        working-directory: packages/database
        run: pnpm exec prisma validate

      - name: Migration drift check
        working-directory: packages/database
        run: |
          if [ -d prisma/migrations ] && [ -n "$(ls -A prisma/migrations 2>/dev/null)" ]; then
            echo "Checking that committed migrations match schema.prisma..."
            pnpm exec prisma migrate diff \
              --from-migrations prisma/migrations \
              --to-schema-datamodel prisma/schema.prisma \
              --shadow-database-url "$DATABASE_URL" \
              --exit-code
          else
            echo "No migrations directory yet — verifying schema applies cleanly via db push."
            pnpm exec prisma db push --skip-generate
          fi

  # ------------------------------------------------------------------
  # Playwright E2E (web). continue-on-error while app services are stubs.
  # ------------------------------------------------------------------
  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    continue-on-error: true # app services are stubbed; do not block PRs yet
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: pnpm install

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build web
        run: pnpm --filter @flowos/web... build

      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: apps/web
        run: pnpm exec playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 7

  # ------------------------------------------------------------------
  # Docker image builds — main branch only (push happens in deploy.yml)
  # ------------------------------------------------------------------
  docker-build:
    name: Docker Build (${{ matrix.app }})
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build-and-test
    strategy:
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.app }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: false
          tags: flowos-${{ matrix.app }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,scope=${{ matrix.app }},mode=max
